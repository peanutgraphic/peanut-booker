name: Accessibility

on:
  pull_request:
    branches:
      - main

jobs:
  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint with jsx-a11y
        continue-on-error: true
        run: npx eslint --ext .js,.jsx,.ts,.tsx src/ --rule 'jsx-a11y/alt-text: warn' --rule 'jsx-a11y/anchor-has-content: warn' --rule 'jsx-a11y/aria-props: error' --rule 'jsx-a11y/aria-role: error'

      - name: Run accessibility tests
        run: npm run test:a11y
